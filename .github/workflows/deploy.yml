# ============================================================
# Deploy Pipeline — Builds & pushes Docker images on merge to main
# ============================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  # ---- Build & Push Docker Images ----
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # ---- API Image ----
      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Web Image ----
      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Deploy (placeholder) ----
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "🚀 Deployment placeholder"
          echo ""
          echo "To deploy, add one of these strategies:"
          echo "  1. SSH into server and docker compose pull && docker compose up -d"
          echo "  2. Use kubectl apply for Kubernetes"
          echo "  3. Use AWS ECS / GCP Cloud Run task definition update"
          echo ""
          echo "Images pushed:"
          echo "  - ${{ env.API_IMAGE }}:$(git rev-parse --short HEAD)"
          echo "  - ${{ env.WEB_IMAGE }}:$(git rev-parse --short HEAD)"
