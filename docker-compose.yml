# ============================================================
# Proptech Platform — Docker Compose (Production)
# Usage: docker compose up -d
# ============================================================

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: proptech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proptech}
      POSTGRES_USER: ${POSTGRES_USER:-proptech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proptech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proptech} -d ${POSTGRES_DB:-proptech}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Redis (caching, sessions, queues) ----
  redis:
    image: redis:7-alpine
    container_name: proptech-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-${REDIS_PASSWORD:?Set REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - proptech-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-${REDIS_PASSWORD:?Set REDIS_PASSWORD}}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- NestJS API Backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: proptech-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-proptech}:${POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}}@postgres:5432/${POSTGRES_DB:-proptech}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      REDIS_URL: redis://:${REDIS_PASSWORD:-${REDIS_PASSWORD:?Set REDIS_PASSWORD}}@redis:6379
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proptech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Next.js Web Frontend ----
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: proptech-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Proptech}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proptech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: proptech-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - proptech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  proptech-network:
    driver: bridge
